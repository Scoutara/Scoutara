// Vercel Serverless Function — securely proxies requests to Anthropic API
// Your ANTHROPIC_API_KEY is stored as a Vercel environment variable (never exposed to the browser)

export default async function handler(req, res) {
  // Only allow POST requests
  if (req.method !== "POST") {
    return res.status(405).json({ error: "Method not allowed" });
  }

  // Check API key is configured
  const apiKey = process.env.ANTHROPIC_API_KEY;
  if (!apiKey) {
    return res.status(404).json({
      error: "AI not configured. Add ANTHROPIC_API_KEY to Vercel environment variables."
    });
  }

  const { prompt, max_tokens = 1000 } = req.body;

  if (!prompt) {
    return res.status(400).json({ error: "prompt is required" });
  }

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens,
        messages: [{ role: "user", content: prompt }],
      }),
    });

    if (!response.ok) {
      const error = await response.json();
      console.error("Anthropic API error:", error);
      return res.status(response.status).json({
        error: error.error?.message || "Anthropic API error"
      });
    }

    const data = await response.json();
    const content = data.content?.map(b => b.text || "").join("\n") || "";

    return res.status(200).json({ content });

  } catch (err) {
    console.error("Server error:", err);
    return res.status(500).json({ error: "Internal server error" });
  }
}
